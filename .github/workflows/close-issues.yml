name: Auto-close Issues

on:
  issues:
    types: [opened]

jobs:
  auto-close-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment and close issue
        uses: actions/github-script@v8
        with:
          script: |
            const author = context.payload.issue.user.login;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Hi, @${author}.
              
              This repository is **not maintained**. For details, see [\`README.md\`](https://github.com/ara303/twMediaDownloader?tab=readme-ov-file#important-information-about-this-fork).

              Alternatives:
              - [Cobalt.tools](https://cobalt.tools), which also has [an API](https://github.com/imputnet/cobalt/blob/main/docs/api.md)
              - [TwitterMediaHarvest](https://github.com/EltonChou/TwitterMediaHarvest) for a user-friendly one click solution 
              - [\`twmd\`](https://github.com/mmpx12/twitter-media-downloader) for automated scraping/bulk downloading if you're comfortable with the CLI
              
              If you use AI/LLMs for code, you could also prompt for help.
              
              Thank you for contributing.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });